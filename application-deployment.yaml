# Golem XIV deployment configuration

ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.xemantic.ai.golem.server.GolemServerKt.module

neo4j:
  protocol: ${NEO4J_PROTOCOL}
  host: ${NEO4J_HOST}
  port: ${NEO4J_PORT}
  database: ${NEO4J_DATABASE}
  username: ${NEO4J_USERNAME}
  password: ${NEO4J_PASSWORD}
  readOnlyUser: golem

httpAuth:
  username: ${HTTP_AUTH_USERNAME}
  password: ${HTTP_AUTH_PASSWORD}
